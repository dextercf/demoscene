; =============================================================================
; config.ini — SysOp configuration file
; Demoscene: The Exploration of Art
; A Cellfish Production
; =============================================================================
;
; This file lets you tune gameplay settings for your BBS.
; Lines starting with ; are comments and are ignored by the game.
;
; DO NOT change anything in the [cellfish] section — the game identity
; is locked to Cellfish and will be restored to defaults if tampered with.
;
; After editing, save the file and the changes take effect next time
; a player starts a new game. Existing save files are not affected.
; =============================================================================


; -----------------------------------------------------------------------------
[bbs]
; Information about your BBS. Shown on the title screen and in the game world.
; -----------------------------------------------------------------------------

; The name of your BBS — appears in the welcome screen and as the player's
; home node name in the game world.
bbs_name = Cellfish BBS

; Your name or handle as SysOp — appears in system messages.
sysop_handle = DexterCF

; A short tagline for your BBS — shown on the title screen (max 60 chars).
bbs_tagline = We are Cellfi.sh


; -----------------------------------------------------------------------------
[gameplay]
; Core gameplay tuning. Adjust these to make the game easier or harder.
; -----------------------------------------------------------------------------

; Total number of days before the game ends and the score is finalised.
; Default: 50. Minimum: 20. Maximum: 200.
game_length_days = 50

; Action points the player gets each day to spend on actions.
; Default: 10. Minimum: 5. Maximum: 20.
action_points_per_day = 10

; Starting resources for a new player.
starting_phone_credits = 200
starting_floppy_disks  = 100
starting_source_code   = 80
starting_artwork       = 50
starting_mod_music     = 30
starting_reputation    = 10
starting_beer          = 0
starting_tools          = 20

; Maximum resources a player can carry at once.
; Encourages trading rather than hoarding.
max_phone_credits = 9999
max_floppy_disks  = 2000
max_source_code   = 1000
max_artwork       = 1000
max_mod_music     = 1000
max_beer          = 48
max_hardware      = 500
max_tools         = 500

; Number of NPC rival crews in the game world.
; Default: 6. Minimum: 2. Maximum: 12.
npc_crew_count = 6

; How aggressively NPC crews raid the player.
; 1 = passive, 2 = normal, 3 = aggressive
npc_aggression = 2

; Number of BBS nodes generated on the network map.
; Default: 20. Minimum: 10. Maximum: 50.
node_count = 20

; Chance (0-100) of a random event occurring each day.
; Default: 25 (25% chance per day).
random_event_chance = 25


; -----------------------------------------------------------------------------
[parties]
; Demoparty settings.
; -----------------------------------------------------------------------------

; How often (in days) a demoparty is scheduled.
; Default: 12. A party roughly every 12 days means ~4 parties per game.
party_frequency_days = 12

; Travel cost in phone credits to attend a party.
; Default: 80.
party_travel_cost = 80

; Whether the 5K run appears at Revision.
; yes = enabled, no = disabled
revision_5k_run = yes

; Whether rave events can occur at parties.
rave_events = yes

; Chance (0-100) a rave occurs at any given party.
; Default: 60.
rave_chance = 60


; -----------------------------------------------------------------------------
[display]
; Visual settings.
; -----------------------------------------------------------------------------

; Force ANSI on or off regardless of what the drop file says.
; auto = use drop file setting (recommended)
; yes  = always use ANSI
; no   = plain ASCII only
ansi_mode = auto

; Path to the art pack folder, relative to the game directory.
; Place .ans files here to override built-in ASCII art.
; See README.txt for art pack file naming conventions.
art_path = art

; How fast ANSI art is displayed, in characters per second.
; 0 = instant (no delay). Default: 0.
; Set to a lower number like 300 to simulate old modem speeds for atmosphere.
ansi_speed = 0

; Screen width in characters. Almost always 80 for BBS use.
screen_width = 80

; Screen height in characters. Almost always 24 for BBS use.
screen_height = 24


; -----------------------------------------------------------------------------
[events]
; Random events that occur each day.
; For custom events, edit config/events.txt (leave empty to use built-in defaults).
; Each line: weight,colour,message,resource,amount
; colour: G=green, R=red, Y=yellow, C=cyan, M=magenta, DG=dark gray
; resource: floppy_disks, phone_credits, source_code, reputation, beer, hardware, tools, turns
; amount: positive for gain, negative for loss (use -1 for turns lost)
; Set events_file to empty to use built-in defaults.
; -----------------------------------------------------------------------------

events_file = events.txt

; Maximum number of entries to keep on the Hall of Fame.
; Default: 20.
hall_of_fame_size = 20

; Maximum length for player handle (from DOOR.SYS).
; Default: 20.
max_handle_length = 20

; Maximum length for crew name input.
; Default: 20.
max_crew_name_length = 20

; Maximum length for oneliner wall posts.
; Default: 60.
max_oneliner_length = 60

; Whether to show the player's previous scores in the Hall of Fame.
; yes = show all scores for a handle, no = show only their best
show_all_scores = no


; -----------------------------------------------------------------------------
[cellfish]
; DO NOT EDIT THIS SECTION.
; Game identity is locked to Cellfish. These values are verified at startup
; and restored to defaults if modified. This is by design.
; -----------------------------------------------------------------------------
game_title    = Demoscene: The Exploration of Art
developer     = Cellfish
version       = 0.1
title_lock    = true
